name: CI/CD Build & Test

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build-macos:
    name: Build, Test and Release App
    runs-on: macos-26
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Swift
      uses: swift-actions/setup-swift@v3
      with:
        swift-version: '6.0.3'

    - name: Make Scripts Executable
      run: chmod +x build.sh test.sh test_launch.sh test_ui.sh

    - name: Run Unit Tests
      run: ./test.sh

    - name: Run Launch Verification Test
      run: ./test_launch.sh

    - name: Run UI Smoke Test
      # Hosted runners don't grant Accessibility (TCC) permission, so this
      # SKIPS loudly (exit 0) on CI and runs for real on a permitted machine.
      run: ./test_ui.sh --no-build

    - name: Verify App Bundle Structure
      run: |
        if [ ! -d "CmdTab.app" ]; then
          echo "Error: CmdTab.app folder was not created!"
          exit 1
        fi
        if [ ! -f "CmdTab.app/Contents/MacOS/CmdTab" ]; then
          echo "Error: Executable binary is missing in the app bundle!"
          exit 1
        fi
        if [ ! -f "CmdTab.app/Contents/Info.plist" ]; then
          echo "Error: Info.plist is missing in the app bundle!"
          exit 1
        fi
        echo "App bundle structure verified successfully."

    - name: Check Code Signature
      run: |
        codesign -d -v CmdTab.app

    - name: Package App Bundle for Release
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        ditto -c -k --keepParent CmdTab.app CmdTab.zip

    - name: Create GitHub Release and Upload Asset
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: CmdTab.zip
        draft: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
