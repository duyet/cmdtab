name: Release Please

# release-please watches conventional commits landing on main and maintains a
# standing "chore(release): vX.Y.Z" PR plus the tracked CHANGELOG.md. Merging
# that PR tags the version and publishes a GitHub Release, which we then hand to
# release.yml (build artifacts + LLM-generated release notes).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write # dispatch release.yml after a release is cut

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.DUYETBOT_GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      # GitHub does NOT trigger other workflows from a release created with the
      # default GITHUB_TOKEN (anti-recursion). An explicit workflow_dispatch IS
      # allowed to start a run, so dispatch the build here.
      - name: Trigger release build
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yml -f tag=${{ steps.release.outputs.tag_name }}
