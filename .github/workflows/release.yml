name: Release

on:
  # Tagging + release creation is owned by release-please (release-please.yml).
  # We fire on the published release it cuts. workflow_dispatch stays for manual builds.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.2.0
        required: true
        type: string

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  models: read
  pull-requests: read

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}

jobs:
  release-notes:
    name: release-notes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      # Centralized release notes: tiered AI summary (Copilot → GitHub Models →
      # AnyRouter), recap stats, compare link, and the migration prompt — all
      # from duyet/llm-release-action, which also publishes the Release body.
      - name: Generate & publish release notes
        uses: duyet/llm-release-action@v1
        with:
          release-tag: ${{ env.RELEASE_TAG }}
          project-name: MinhAgent
          notes-prompt-file: .github/release-notes-prompt.md
          system-prompt-file: .github/release-notes-system-prompt.md
          migration-prompt-file: .github/release-migration-prompt.md
          anyrouter-source: minhagent-app
          anyrouter-title: MinhAgent
          anyrouter-api-key: ${{ secrets.ANYROUTER_API_KEY }}
          anyrouter-model: ${{ vars.ANYROUTER_MODEL || 'openai/gpt-4o-mini' }}

  artifacts:
    name: artifacts
    needs: release-notes
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}
          fetch-depth: 0

      # Build must fail the job — never publish a release whose app build failed.
      - name: Build macOS app
        run: ./build.sh

      - name: Package artifacts
        run: |
          mkdir -p out
          if [ -d MinhAgent.app ]; then
            ditto -c -k --keepParent MinhAgent.app "out/MinhAgent-${RELEASE_TAG}-macos.zip"
          fi
          git archive --format=tar.gz -o "out/MinhAgent-${RELEASE_TAG}-source.tar.gz" HEAD
          ( cd out && shasum -a 256 * > SHA256SUMS )

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" out/* --clobber
